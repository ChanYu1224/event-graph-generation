data:
  batch_size: 64          # per-GPU (effective: 64 × 4 = 256)
  num_workers: 4

training:
  learning_rate: 4.0e-4   # sqrt scaling: 1e-4 × sqrt(256/16) = 4e-4
  scheduler_params:
    T_max: 100
    warmup_epochs: 10     # larger batch → longer warmup
  early_stopping_patience: 20

wandb:
  enabled: false
