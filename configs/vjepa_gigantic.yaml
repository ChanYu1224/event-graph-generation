# V-JEPA 2.1 ViT-G (Gigantic) feature extraction configuration (2B params)
vjepa:
  backend: "hub"
  hub_model_name: "vjepa2_1_vit_gigantic_384"
  hub_repo: "facebookresearch/vjepa2"
  image_size: 384
  frames_per_clip: 16
  hidden_size: 1664
  total_tokens: 4608       # 8 temporal × 576 spatial
  temporal_tokens: 8
  spatial_tokens: 576      # (384/16)²
  dtype: "bfloat16"
  features_dir: "data/vjepa_features_v21_vitG"
