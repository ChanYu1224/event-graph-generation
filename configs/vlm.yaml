# VLM configuration for local Qwen 3.5 inference
vlm:
  model_name: "Qwen/Qwen3.5-9B"
  device_map: "auto"
  torch_dtype: "bfloat16"
  max_new_tokens: 4096
  temperature: 0.1
  do_sample: true
  thinking: false

  # Sliding window settings for video annotation
  clip_length: 16
  clip_stride: 8
  target_fps: 1.0

  # Retry settings
  max_retries: 3

  # Output settings
  output_dir: "data/annotations"
